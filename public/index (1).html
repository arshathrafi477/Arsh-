<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify your email</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f8fafc;
      --surface:   #ffffff;
      --border:    #e2e8f0;
      --ring:      #6366f1;
      --primary:   #6366f1;
      --primary-h: #4f46e5;
      --success:   #10b981;
      --error:     #ef4444;
      --text:      #0f172a;
      --muted:     #64748b;
      --light:     #f1f5f9;
      --radius:    12px;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }

    /* ── Icon ── */
    .icon-wrap {
      width: 52px; height: 52px;
      background: var(--light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .icon-wrap svg { width: 26px; height: 26px; }

    /* ── Headings ── */
    h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 6px; }
    .subtitle { font-size: .875rem; color: var(--muted); line-height: 1.5; margin-bottom: 28px; }
    .subtitle strong { color: var(--text); font-weight: 600; }

    /* ── Steps ── */
    .step { display: none; }
    .step.active { display: block; }

    /* ── Form elements ── */
    label { display: block; font-size: .8125rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }

    input[type="email"],
    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .9375rem;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--ring); }
    input::placeholder { color: #c0cad8; }

    /* ── OTP boxes ── */
    .otp-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 4px 0;
    }
    .otp-group input {
      width: 48px; height: 56px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0;
    }
    .otp-group input:focus { border-color: var(--ring); }

    /* ── Buttons ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: .9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn-primary { background: var(--primary); color: #fff; margin-top: 20px; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-h); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }

    .btn-ghost {
      background: none; color: var(--primary);
      font-size: .8125rem; font-weight: 600;
      border: none; cursor: pointer;
      padding: 4px 0;
      transition: opacity .15s;
    }
    .btn-ghost:hover:not(:disabled) { opacity: .7; }
    .btn-ghost:disabled { opacity: .4; cursor: default; }

    /* ── Alert ── */
    .alert {
      display: none;
      font-size: .8125rem;
      border-radius: 7px;
      padding: 10px 13px;
      margin-top: 14px;
      line-height: 1.5;
    }
    .alert.show { display: block; }
    .alert.error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .alert.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }

    /* ── Footer row ── */
    .footer-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 18px;
      flex-wrap: wrap; gap: 8px;
    }
    .back-btn {
      font-size: .8rem; color: var(--muted);
      background: none; border: none;
      cursor: pointer; text-decoration: underline;
    }
    .back-btn:hover { color: var(--text); }

    /* ── Success ── */
    .success-icon {
      width: 64px; height: 64px;
      background: #ecfdf5;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .success-icon svg { width: 32px; height: 32px; color: var(--success); }
    .step-success { text-align: center; padding: 8px 0; }
    .step-success h1 { margin-bottom: 8px; }
    .step-success .subtitle { margin-bottom: 0; }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      flex-shrink: 0;
    }

    /* ── Cooldown badge ── */
    #cooldown-badge {
      font-size: .75rem; color: var(--muted);
      display: none;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- ─── Step 1: Enter email ─────────────────────────────────────────── -->
  <div class="step active" id="step-email">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m22 7-10 7L2 7"/>
      </svg>
    </div>
    <h1>Verify your email</h1>
    <p class="subtitle">We'll send a 6-digit code to confirm your address.</p>

    <label for="email-input">Email address</label>
    <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email" />

    <div class="alert" id="email-alert"></div>

    <button class="btn btn-primary" id="send-btn" onclick="sendOTP()">
      Send code
    </button>
  </div>

  <!-- ─── Step 2: Enter OTP ───────────────────────────────────────────── -->
  <div class="step" id="step-otp">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>Enter the code</h1>
    <p class="subtitle">Sent to <strong id="email-display"></strong>. Check your inbox (and spam).</p>

    <label>6-digit code</label>
    <div class="otp-group" id="otp-group">
      <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" />
      <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" />
      <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" />
      <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" />
      <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" />
      <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" />
    </div>

    <div class="alert" id="otp-alert"></div>

    <button class="btn btn-primary" id="verify-btn" onclick="verifyOTP()">
      Verify email
    </button>

    <div class="footer-row">
      <button class="back-btn" onclick="goBack()">← Change email</button>
      <div>
        <button class="btn-ghost" id="resend-btn" onclick="resendOTP()">Resend code</button>
        <div id="cooldown-badge"></div>
      </div>
    </div>
  </div>

  <!-- ─── Step 3: Success ─────────────────────────────────────────────── -->
  <div class="step step-success" id="step-success">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
    </div>
    <h1>Email verified</h1>
    <p class="subtitle">Your address has been confirmed. You're all set!</p>
  </div>

</div>

<script>
  // ── State ───────────────────────────────────────────────────────────────────
  let currentEmail   = '';
  let cooldownTimer  = null;

  // ── DOM helpers ─────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function showStep(id) {
    document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
    $(id).classList.add('active');
  }

  function setAlert(id, msg, type) {
    const el = $(id);
    el.textContent = msg;
    el.className   = `alert ${type} show`;
  }
  function clearAlert(id) {
    const el = $(id);
    el.textContent = '';
    el.className   = 'alert';
  }

  function setLoading(btnId, loading) {
    const btn = $(btnId);
    btn.disabled = loading;
    if (loading) {
      btn.innerHTML = '<span class="spinner"></span>';
    } else {
      btn.innerHTML = btnId === 'send-btn'   ? 'Send code'     :
                      btnId === 'verify-btn' ? 'Verify email'  : 'Resend code';
    }
  }

  // ── OTP input wiring ────────────────────────────────────────────────────────
  const otpInputs = Array.from(document.querySelectorAll('#otp-group input'));

  otpInputs.forEach((inp, i) => {
    inp.addEventListener('input', e => {
      // Allow only digits
      inp.value = inp.value.replace(/\D/g, '').slice(0, 1);
      if (inp.value && i < otpInputs.length - 1) otpInputs[i + 1].focus();
    });

    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !inp.value && i > 0) {
        otpInputs[i - 1].focus();
        otpInputs[i - 1].value = '';
      }
      if (e.key === 'Enter') verifyOTP();
    });

    // Handle paste on first box
    inp.addEventListener('paste', e => {
      const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
      if (pasted.length >= 6) {
        e.preventDefault();
        otpInputs.forEach((box, j) => { box.value = pasted[j] || ''; });
        otpInputs[5].focus();
      }
    });
  });

  function getOTPValue() {
    return otpInputs.map(i => i.value).join('');
  }

  function clearOTPInputs() {
    otpInputs.forEach(i => { i.value = ''; });
    otpInputs[0].focus();
  }

  // ── Cooldown UI ─────────────────────────────────────────────────────────────
  function startCooldown(seconds) {
    const badge   = $('cooldown-badge');
    const resend  = $('resend-btn');
    resend.disabled = true;
    badge.style.display = 'block';

    let remaining = seconds;
    badge.textContent = `Resend in ${remaining}s`;

    cooldownTimer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(cooldownTimer);
        resend.disabled     = false;
        badge.style.display = 'none';
      } else {
        badge.textContent = `Resend in ${remaining}s`;
      }
    }, 1000);
  }

  // ── Config ──────────────────────────────────────────────────────────────────
  const API_BASE = 'https://arsh-7.onrender.com';

  // ── Fetch with timeout ──────────────────────────────────────────────────────
  async function fetchWithTimeout(url, options, timeoutMs = 15000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(url, { ...options, signal: controller.signal });
      return res;
    } catch (err) {
      if (err.name === 'AbortError') throw new Error('timeout');
      throw err;
    } finally {
      clearTimeout(timer);
    }
  }

  function friendlyError(err) {
    if (err.message === 'timeout') {
      return 'The server took too long to respond. It may be waking up — please wait 20 seconds and try again.';
    }
    return 'Network error. Please check your connection and try again.';
  }

  // ── API calls ───────────────────────────────────────────────────────────────
  async function sendOTP() {
    clearAlert('email-alert');
    const emailVal = $('email-input').value.trim();

    if (!emailVal) {
      setAlert('email-alert', 'Please enter your email address.', 'error');
      return;
    }

    // Basic email format check
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
      setAlert('email-alert', 'Please enter a valid email address.', 'error');
      return;
    }

    setLoading('send-btn', true);
    setAlert('email-alert', 'Contacting server…', 'success');

    try {
      const res = await fetchWithTimeout(`${API_BASE}/api/send-otp`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email: emailVal }),
      }, 20000);

      let data;
      try { data = await res.json(); }
      catch { throw new Error('bad_json'); }

      if (!res.ok || !data.success) {
        setAlert('email-alert', data.message || `Server error (${res.status}). Try again.`, 'error');
        return;
      }

      currentEmail = emailVal.toLowerCase();
      $('email-display').textContent = currentEmail;
      showStep('step-otp');
      clearOTPInputs();
      startCooldown(60);
    } catch (err) {
      if (err.message === 'bad_json') {
        setAlert('email-alert', 'Unexpected response from server. Please try again.', 'error');
      } else {
        setAlert('email-alert', friendlyError(err), 'error');
      }
    } finally {
      setLoading('send-btn', false);
    }
  }

  async function verifyOTP() {
    clearAlert('otp-alert');
    const otpVal = getOTPValue();

    if (otpVal.length < 6) {
      setAlert('otp-alert', 'Enter all 6 digits.', 'error');
      return;
    }

    setLoading('verify-btn', true);

    try {
      const res = await fetchWithTimeout(`${API_BASE}/api/verify-otp`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email: currentEmail, otp: otpVal }),
      }, 15000);

      let data;
      try { data = await res.json(); }
      catch { throw new Error('bad_json'); }

      if (!res.ok || !data.success) {
        setAlert('otp-alert', data.message || `Verification failed (${res.status}).`, 'error');
        clearOTPInputs();
        return;
      }

      showStep('step-success');
    } catch (err) {
      if (err.message === 'bad_json') {
        setAlert('otp-alert', 'Unexpected response from server. Please try again.', 'error');
      } else {
        setAlert('otp-alert', friendlyError(err), 'error');
      }
    } finally {
      setLoading('verify-btn', false);
    }
  }

  async function resendOTP() {
    clearAlert('otp-alert');
    setAlert('otp-alert', 'Sending new code…', 'success');

    try {
      const res = await fetchWithTimeout(`${API_BASE}/api/send-otp`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email: currentEmail }),
      }, 20000);

      let data;
      try { data = await res.json(); }
      catch { throw new Error('bad_json'); }

      if (!res.ok || !data.success) {
        setAlert('otp-alert', data.message || 'Failed to resend. Try again.', 'error');
        return;
      }

      clearOTPInputs();
      setAlert('otp-alert', 'New code sent — check your inbox (and spam folder).', 'success');
      startCooldown(60);
    } catch (err) {
      if (err.message === 'bad_json') {
        setAlert('otp-alert', 'Unexpected response from server.', 'error');
      } else {
        setAlert('otp-alert', friendlyError(err), 'error');
      }
    }
  }

  function goBack() {
    clearInterval(cooldownTimer);
    clearAlert('otp-alert');
    clearOTPInputs();
    showStep('step-email');
  }

  // Allow pressing Enter on the email field
  $('email-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendOTP();
  });
</script>
</body>
</html>
